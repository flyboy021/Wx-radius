<!-- @dsCard group="Colors" viewport="700x150" name="Flight Categories" subtitle="The core semantic system — VFR / MVFR / IFR / LIFR" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--wx-panel); font-family:var(--wx-font-sans); padding:18px; }
  .row { display:flex; gap:12px; }
  .cat { flex:1; border-radius:var(--wx-radius-lg); padding:14px 14px 12px; color:#fff;
    display:flex; flex-direction:column; gap:4px; }
  .cat .k { font-weight:800; font-size:16px; letter-spacing:.02em; }
  .cat .d { font-size:11px; font-weight:600; opacity:.92; }
  .cat .hex { font-family:var(--wx-font-mono); font-size:11px; opacity:.9; margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cat" style="background:var(--wx-vfr)">
      <span class="k">VFR</span><span class="d">Visual Flight Rules</span><span class="hex">#11a911</span></div>
    <div class="cat" style="background:var(--wx-mvfr)">
      <span class="k">MVFR</span><span class="d">Marginal VFR</span><span class="hex">#2b6fff</span></div>
    <div class="cat" style="background:var(--wx-ifr)">
      <span class="k">IFR</span><span class="d">Instrument Flight Rules</span><span class="hex">#e0152b</span></div>
    <div class="cat" style="background:var(--wx-lifr)">
      <span class="k">LIFR</span><span class="d">Low IFR</span><span class="hex">#d017d0</span></div>
  </div>
</body>
</html>
