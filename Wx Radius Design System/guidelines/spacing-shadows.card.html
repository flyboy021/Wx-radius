<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & Shadows" subtitle="Restrained deep shadows on the dark ground" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--wx-bg); font-family:var(--wx-font-sans); padding:24px; }
  .row { display:flex; gap:20px; flex-wrap:wrap; }
  .cell { text-align:center; }
  .box { width:130px; height:64px; background:var(--wx-panel-2); border:1px solid var(--wx-line);
    border-radius:var(--wx-radius-xl); }
  .cap { color:var(--wx-muted); font-size:11px; margin-top:8px; font-family:var(--wx-font-mono); }
  .clock { display:flex; align-items:center; justify-content:center; color:#cdd6e0; font-weight:700; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="box clock" style="border-radius:999px;width:110px;box-shadow:var(--wx-shadow-1)">14:32Z</div><div class="cap">shadow-1 · clock</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--wx-shadow-pop)"></div><div class="cap">shadow-pop · popup</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--wx-shadow-panel)"></div><div class="cap">shadow-panel</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--wx-shadow-modal)"></div><div class="cap">shadow-modal</div></div>
  </div>
</body>
</html>
