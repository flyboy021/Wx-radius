<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="Compact px scale, weights 400–800 (800 is heavily used)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--wx-panel); color:var(--wx-text); font-family:var(--wx-font-sans); padding:20px; }
  .r { display:flex; align-items:baseline; gap:16px; padding:5px 0; border-bottom:1px solid var(--wx-line); }
  .r:last-child { border-bottom:0; }
  .meta { width:150px; color:var(--wx-muted); font-family:var(--wx-font-mono); font-size:11px; flex:none; }
  .sample { color:var(--wx-text); }
</style>
</head>
<body>
  <div class="r"><span class="meta">22px · 800</span><span class="sample" style="font-size:22px;font-weight:800">Station id — KJFK</span></div>
  <div class="r"><span class="meta">18px · 700</span><span class="sample" style="font-size:18px;font-weight:700">Wx Radius (h1 / modal title)</span></div>
  <div class="r"><span class="meta">16px · 800</span><span class="sample" style="font-size:16px;font-weight:800">Decoded value / list id</span></div>
  <div class="r"><span class="meta">15px · 700</span><span class="sample" style="font-size:15px;font-weight:700">Primary button / input</span></div>
  <div class="r"><span class="meta">14px · 400</span><span class="sample" style="font-size:14px">Body copy — default text</span></div>
  <div class="r"><span class="meta">13px · 700</span><span class="sample" style="font-size:13px;font-weight:700">Control label</span></div>
  <div class="r"><span class="meta">11px · 800</span><span class="sample" style="font-size:11px;font-weight:800">Category chip</span></div>
  <div class="r"><span class="meta">10px · 800 · .05em</span><span class="sample" style="font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase">Micro-label / tag</span></div>
</body>
</html>
