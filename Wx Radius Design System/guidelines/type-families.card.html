<!-- @dsCard group="Type" viewport="700x170" name="Font Families" subtitle="Native system sans for chrome, monospace for raw data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--wx-panel); color:var(--wx-text); font-family:var(--wx-font-sans); padding:20px; }
  .fam { margin-bottom:16px; }
  .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--wx-faint); font-weight:700; margin-bottom:4px; }
  .spec-sans { font-family:var(--wx-font-sans); font-size:24px; font-weight:700; }
  .spec-mono { font-family:var(--wx-font-mono); font-size:20px; color:#cdd6e0; }
  .stack { color:var(--wx-muted); font-size:11px; margin-top:3px; font-family:var(--wx-font-mono); }
</style>
</head>
<body>
  <div class="fam">
    <div class="lbl">Sans — UI chrome, labels, headings</div>
    <div class="spec-sans">Vicinity · METAR/TAF within 50nm</div>
    <div class="stack">-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif</div>
  </div>
  <div class="fam">
    <div class="lbl">Mono — raw observations & tabular data</div>
    <div class="spec-mono">METAR KJFK 211951Z 20010KT 10SM FEW250 21/12 A2991</div>
    <div class="stack">ui-monospace, "SF Mono", Menlo, Consolas, monospace</div>
  </div>
</body>
</html>
