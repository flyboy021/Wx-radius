<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="From 4px tags up to the 999px clock capsule" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--wx-panel); font-family:var(--wx-font-sans); padding:20px; }
  .row { display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; }
  .cell { text-align:center; }
  .box { width:70px; height:52px; background:var(--wx-panel-2); border:1px solid var(--wx-line); }
  .cap { color:var(--wx-muted); font-size:11px; margin-top:6px; font-family:var(--wx-font-mono); }
  .pill { width:110px; height:34px; border-radius:999px; background:var(--wx-panel-2);
    border:1px solid var(--wx-line); display:flex; align-items:center; justify-content:center;
    color:#cdd6e0; font-weight:700; font-size:13px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="cap">xs · 4</div></div>
    <div class="cell"><div class="box" style="border-radius:5px"></div><div class="cap">sm · 5</div></div>
    <div class="cell"><div class="box" style="border-radius:6px"></div><div class="cap">md · 6</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="cap">lg · 8</div></div>
    <div class="cell"><div class="box" style="border-radius:10px"></div><div class="cap">xl · 10</div></div>
    <div class="cell"><div class="box" style="border-radius:14px"></div><div class="cap">2xl · 14</div></div>
    <div class="cell"><div class="pill">14:32Z</div><div class="cap">pill · 999</div></div>
  </div>
</body>
</html>
