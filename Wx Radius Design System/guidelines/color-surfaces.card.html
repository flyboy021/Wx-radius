<!-- @dsCard group="Colors" viewport="700x160" name="Surfaces & Text" subtitle="Layered dark slate surfaces, borders and text inks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--wx-panel); font-family:var(--wx-font-sans); padding:18px; }
  .grid { display:flex; gap:10px; flex-wrap:wrap; }
  .sw { width:104px; border:1px solid var(--wx-line); border-radius:var(--wx-radius-md); overflow:hidden; }
  .chip { height:52px; }
  .meta { padding:6px 8px; }
  .nm { color:var(--wx-text); font-size:11px; font-weight:700; }
  .hex { color:var(--wx-muted); font-family:var(--wx-font-mono); font-size:10px; margin-top:1px; }
  .inks { display:flex; gap:18px; margin-top:14px; align-items:baseline; }
  .inks span { font-size:15px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--wx-bg)"></div><div class="meta"><div class="nm">bg</div><div class="hex">#0d1117</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wx-panel)"></div><div class="meta"><div class="nm">panel</div><div class="hex">#11161f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wx-panel-2)"></div><div class="meta"><div class="nm">panel-2</div><div class="hex">#1c2430</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wx-line)"></div><div class="meta"><div class="nm">line</div><div class="hex">#222c39</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wx-map)"></div><div class="meta"><div class="nm">map</div><div class="hex">#0a0e14</div></div></div>
  </div>
  <div class="inks">
    <span style="color:var(--wx-text);font-weight:700">Primary text — #e7eef6</span>
    <span style="color:var(--wx-muted);font-weight:600">Muted — #8fa0b3</span>
    <span style="color:var(--wx-faint)">Faint — #6b7a8d</span>
  </div>
</body>
</html>
