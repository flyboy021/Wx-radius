<!-- @dsCard group="Type" viewport="700x180" name="Raw Data Specimen" subtitle="How monospace weather strings are set & highlighted" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--wx-panel); font-family:var(--wx-font-mono); padding:20px;
    color:#cdd6e0; font-size:13px; line-height:1.5; }
  .line { border-left:3px solid var(--wx-vfr); padding:4px 0 4px 10px; margin-bottom:8px;
    display:flex; gap:10px; align-items:flex-start; }
  .line.taf { border-left-color:var(--wx-mvfr); color:#9fd6ff; }
  .id { font-weight:800; }
  .z { color:var(--wx-time-hl); font-weight:800; }
  .pill { flex:none; color:#fff; font-size:11px; font-weight:800; padding:1px 7px; border-radius:5px; }
</style>
</head>
<body>
  <div class="line">
    <span style="flex:1"><span class="id">METAR KJFK</span> <span class="z">211951Z</span> 20010KT 10SM FEW250 21/12 A2991</span>
    <span class="pill" style="background:var(--wx-vfr)">VFR</span>
  </div>
  <div class="line taf">
    <span style="flex:1"><span class="id">TAF KJFK</span> <span class="z">211730Z</span> 2118/2224 21012KT P6SM BKN040</span>
    <span class="pill" style="background:var(--wx-mvfr)">MVFR</span>
  </div>
  <div class="line" style="border-left-color:var(--wx-ifr);color:#cdd6e0">
    <span style="flex:1"><span class="id">METAR KEWR</span> <span class="z">211951Z</span> 18016G26KT 2SM +RA OVC008 17/16 A2985</span>
    <span class="pill" style="background:var(--wx-ifr)">IFR</span>
  </div>
</body>
</html>
