<!-- @dsCard group="Brand" viewport="700x180" name="App Mark" subtitle="Radar ring, crosshair ticks, green station dot & wind barb" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--wx-panel); font-family:var(--wx-font-sans); padding:22px;
    display:flex; align-items:center; gap:24px; }
  img { border-radius:20px; display:block; }
  .txt { color:var(--wx-text); }
  .name { font-size:24px; font-weight:800; letter-spacing:.01em; }
  .tag { color:var(--wx-muted); font-size:13px; margin-top:4px; }
  .note { color:var(--wx-faint); font-size:11px; margin-top:10px; max-width:360px; line-height:1.5; }
</style>
</head>
<body>
  <img src="../assets/icon-512.png" width="120" height="120" alt="Vicinity app mark" />
  <div class="txt">
    <div class="name">Vicinity</div>
    <div class="tag">METAR / TAF for every station within 50nm</div>
    <div class="note">The only brand mark supplied by the source. A blue radar ring with
      crosshair ticks over a green (VFR) station dot and a white wind barb — the app in one glyph.</div>
  </div>
</body>
</html>
