<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#11161f" />
<title>Wx Radius — METAR/TAF within 50nm</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#0d1117; --panel:#11161f; --panel2:#1c2430; --line:#222c39;
    --txt:#e7eef6; --muted:#8fa0b3; --accent:#2b6fff;
    --vfr:#11a911; --mvfr:#2b6fff; --ifr:#e0152b; --lifr:#d017d0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  #app{display:flex;flex-direction:column;height:100%}
  header{background:var(--panel);padding:max(env(safe-area-inset-top),12px) 14px 10px;}
  .row1{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  h1{font-size:18px;margin:0;font-weight:700}
  .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .search{display:flex;gap:8px;margin-top:10px}
  .search input{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);border-radius:8px;height:40px;padding:0 12px;font-size:15px}
  .search button{background:var(--accent);color:#fff;border:0;border-radius:8px;height:40px;
    padding:0 14px;font-weight:700;font-size:15px}
  .search button.ghost{background:var(--panel2);border:1px solid var(--line)}
  #map{height:42vh;width:100%;background:#0a0e14}
  .legend{display:flex;align-items:center;gap:14px;background:var(--panel);
    padding:6px 12px;flex-wrap:wrap}
  .legend .item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:50%}
  #status{padding:8px 12px;font-size:13px}
  #status.err{background:#2a1416;color:#ff9094}
  #list{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
  .card{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;gap:10px;cursor:pointer}
  .chip{min-width:46px;height:22px;border-radius:5px;color:#fff;font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;margin-top:2px}
  .body{flex:1;min-width:0}
  .id{font-size:15px;font-weight:700}
  .dist{color:var(--muted);font-weight:500;font-size:12px;margin-left:6px}
  .name{color:var(--muted);font-size:12px;margin:1px 0 3px}
  .raw{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:#cdd6e0;
    white-space:pre-wrap;word-break:break-word}
  .taf{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:#8fd0ff;margin-top:5px;
    white-space:pre-wrap;word-break:break-word}
  .taf.none{color:#6b7a8d;font-style:italic}
  footer{background:var(--panel);padding:8px 12px max(env(safe-area-inset-bottom),8px);
    display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--line)}
  .disc{color:#6b7a8d;font-size:10px;flex:1}
  .tip{background:#ffb400;color:#1a1100;border:0;border-radius:8px;padding:9px 14px;
    font-weight:800;font-size:13px;white-space:nowrap}
  .leaflet-popup-content{margin:8px 10px;font-size:12px}
  .pin{width:18px;height:18px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #0006}
  .you{width:16px;height:16px;border-radius:50%;background:#1e90ff;border:3px solid #fff;
    box-shadow:0 0 0 2px #1e90ff88, 0 0 12px #1e90ffcc}
  .you::after{content:"";position:absolute;left:50%;top:50%;width:16px;height:16px;
    margin:-8px 0 0 -8px;border-radius:50%;background:#1e90ff66;animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(3.2);opacity:0}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="row1">
      <h1>Wx Radius · 50nm</h1>
      <span id="updated" class="sub"></span>
    </div>
    <div id="where" class="sub">Locating…</div>
    <div class="search">
      <input id="q" placeholder="Airport id (e.g. KJFK)" autocapitalize="characters"
             autocorrect="off" spellcheck="false" inputmode="text" />
      <button id="go">Go</button>
      <button id="gps" class="ghost" title="Use my location">◎</button>
    </div>
  </header>

  <div id="map"></div>

  <div class="legend">
    <span class="item"><span class="dot" style="background:var(--vfr)"></span>VFR</span>
    <span class="item"><span class="dot" style="background:var(--mvfr)"></span>MVFR</span>
    <span class="item"><span class="dot" style="background:var(--ifr)"></span>IFR</span>
    <span class="item"><span class="dot" style="background:var(--lifr)"></span>LIFR</span>
  </div>

  <div id="status"></div>
  <div id="list"></div>

  <footer>
    <span class="disc">Situational awareness only — not an official weather briefing.
      Data: FAA Aviation Weather Center.</span>
    <button id="tip" class="tip">☕ Tip the dev</button>
  </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---- CONFIG -------------------------------------------------------------
// Put your tip-jar link here. Easiest options (no code, ~2 min to set up):
//   • Stripe Payment Link:  https://dashboard.stripe.com/payment-links
//   • Ko-fi:                https://ko-fi.com
//   • Buy Me a Coffee:      https://buymeacoffee.com
const TIP_URL = "https://buymeacoffee.com/yourname"; // <-- change me
const RADIUS_NM = 50;
const DEFAULT_ZOOM = 10; // initial zoom — centered on you, zoomed in on your area

// ---- geo helpers --------------------------------------------------------
const toRad = d => d * Math.PI / 180;
function bbox(lat, lon, r){
  const dLat = r/60, c = Math.max(Math.cos(toRad(lat)), 0.01), dLon = r/(60*c);
  return [lat-dLat, lon-dLon, lat+dLat, lon+dLon];
}
function distanceNm(a,b,c,d){
  const R=3440.065, dLat=toRad(c-a), dLon=toRad(d-b);
  const x=Math.sin(dLat/2)**2 + Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.min(1, Math.sqrt(x)));
}
const COLORS = {VFR:"#11a911", MVFR:"#2b6fff", IFR:"#e0152b", LIFR:"#d017d0"};
const catColor = c => COLORS[c] || "#8a93a0";

// ---- API ----------------------------------------------------------------
// The weather service blocks direct browser calls (CORS), so requests go
// through a tiny proxy. Pick ONE:
//   A) No local server (recommended): deploy worker.js to Cloudflare once
//      (free) and paste its URL below. Then just open this file or host it on
//      GitHub Pages — no `node server.js` needed.
//   B) Local node server: leave PROXY_BASE = "" and run `node server.js`.
const PROXY_BASE = "https://metarsfast.dehaven-jeremy.workers.dev"; // your Cloudflare Worker
const API = (PROXY_BASE || "") + "/api/data";
async function getJson(url){
  const r = await fetch(url);
  if (r.status === 204) return [];
  if (!r.ok) throw new Error("Weather service error " + r.status);
  return r.json();
}
async function fetchWx(lat, lon){
  const [s,w,n,e] = bbox(lat, lon, RADIUS_NM);
  const box = `${s},${w},${n},${e}`;
  const [metars, tafs] = await Promise.all([
    getJson(`${API}/metar?bbox=${box}&format=json`),
    getJson(`${API}/taf?bbox=${box}&format=json`)
  ]);
  const tafById = {};
  for (const t of tafs) tafById[t.icaoId] = t.rawTAF || "";
  return metars
    .map(m => ({...m, dist: distanceNm(lat, lon, m.lat, m.lon), taf: tafById[m.icaoId] || null}))
    .filter(m => m.dist <= RADIUS_NM)
    .sort((a,b) => a.dist - b.dist);
}
async function geocode(idRaw){
  const id = idRaw.trim().toUpperCase();
  if (!id) throw new Error("Enter an airport identifier");
  const m = await getJson(`${API}/metar?ids=${id}&format=json`);
  if (m.length && m[0].lat != null) return {lat:m[0].lat, lon:m[0].lon, name:m[0].name || id};
  const a = await getJson(`${API}/airport?ids=${id}&format=json`);
  if (a.length && a[0].lat != null) return {lat:a[0].lat, lon:a[0].lon, name:(a[0].name||id).trim()};
  throw new Error(`Airport "${id}" not found`);
}

// ---- map ----------------------------------------------------------------
const map = L.map("map", {zoomControl:true, attributionControl:false})
  .setView([39.5,-98.35], 4);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {maxZoom:18})
  .addTo(map);
let layer = L.layerGroup().addTo(map);
let circle = null;
let youMarker = null;

function pinIcon(cat){
  return L.divIcon({className:"", html:`<div class="pin" style="background:${catColor(cat)}"></div>`,
    iconSize:[18,18], iconAnchor:[9,9]});
}
function youIcon(){
  return L.divIcon({className:"", html:`<div class="you"></div>`, iconSize:[16,16], iconAnchor:[8,8]});
}

// ---- UI -----------------------------------------------------------------
const $ = id => document.getElementById(id);
let center = null;

function zulu(d){ return d ? d.toUTCString().slice(17,22) + "Z" : ""; }
function setStatus(msg, isErr){
  const el = $("status"); el.textContent = msg || ""; el.className = isErr ? "err" : "";
  el.style.display = msg ? "block" : "none";
}

function render(stations){
  layer.clearLayers();
  if (circle) map.removeLayer(circle);
  if (center){
    circle = L.circle([center.lat, center.lon], {radius: RADIUS_NM*1852,
      color:"#2b6fff", weight:1.5, opacity:.6, fillColor:"#2b6fff", fillOpacity:.06}).addTo(map);
    if (youMarker) map.removeLayer(youMarker);
    youMarker = L.marker([center.lat, center.lon], {icon: youIcon(), zIndexOffset:1000})
      .addTo(map).bindPopup(center.name === "My location" ? "You are here" : center.name);
  }
  const list = $("list"); list.innerHTML = "";
  if (!stations.length){
    list.innerHTML = `<div class="card"><div class="body name">No reporting stations within ${RADIUS_NM}nm.</div></div>`;
  }
  const pts = [];
  for (const s of stations){
    const m = L.marker([s.lat, s.lon], {icon: pinIcon(s.fltCat)}).addTo(layer);
    m.bindPopup(`<b>${s.icaoId} · ${s.fltCat||"?"}</b><br>${s.rawOb||""}`);
    pts.push([s.lat, s.lon]);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="chip" style="background:${catColor(s.fltCat)}">${s.fltCat||"?"}</div>
      <div class="body">
        <div><span class="id">${s.icaoId}</span><span class="dist">${Math.round(s.dist)} nm</span></div>
        <div class="name">${(s.name||"").trim()}</div>
        <div class="raw">${s.rawOb||""}</div>
        <div class="taf-slot"></div>
      </div>`;
    card.addEventListener("click", () => {
      map.setView([s.lat, s.lon], 9);
      m.openPopup();
      const slot = card.querySelector(".taf-slot");
      if (slot.dataset.open){ slot.innerHTML=""; delete slot.dataset.open; return; }
      slot.dataset.open = "1";
      slot.innerHTML = s.taf
        ? `<div class="taf">TAF  ${s.taf}</div>`
        : `<div class="taf none">No TAF for this station.</div>`;
    });
    list.appendChild(card);
  }
  // Center on the pilot's location, zoomed in. (Pinch/scroll out to see the full 50nm.)
  if (center) map.setView([center.lat, center.lon], DEFAULT_ZOOM);
}

async function load(c){
  if (!c) return;
  center = c;
  $("where").textContent = c.name;
  setStatus("Loading weather…");
  try{
    const data = await fetchWx(c.lat, c.lon);
    render(data);
    $("updated").textContent = "as of " + zulu(new Date());
    setStatus(data.length ? "" : `No stations within ${RADIUS_NM}nm.`);
  }catch(e){
    setStatus(e.message || "Could not load weather", true);
  }
}

function useMyLocation(){
  setStatus("Getting your location…");
  if (!navigator.geolocation){ setStatus("Location not available — search an airport.", true); return; }
  navigator.geolocation.getCurrentPosition(
    p => load({lat:p.coords.latitude, lon:p.coords.longitude, name:"My location"}),
    () => setStatus("Location denied — search an airport above.", true),
    {enableHighAccuracy:true, timeout:10000}
  );
}

$("go").addEventListener("click", async () => {
  try{ setStatus("Searching…"); await load(await geocode($("q").value)); }
  catch(e){ setStatus(e.message, true); }
});
$("q").addEventListener("keydown", e => { if (e.key === "Enter") $("go").click(); });
$("gps").addEventListener("click", useMyLocation);
$("tip").addEventListener("click", () => window.open(TIP_URL, "_blank", "noopener"));

// PWA service worker
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});

// go
useMyLocation();
</script>
</body>
</html>
